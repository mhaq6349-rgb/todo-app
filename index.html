<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Todo</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg:#0a0a12; --surface:rgba(255,255,255,0.035);
  --surface-hover:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.06);
  --text:#e8e8f0; --text-secondary:rgba(255,255,255,0.4);
  --text-muted:rgba(255,255,255,0.25); --primary:#6c5ce7;
  --primary-hover:#7c6ff7; --primary-glow:rgba(108,92,231,0.2);
  --complete:#00cec9; --delete:#ff6b81; --overdue:#ff6b81; --due-soon:#f9ca24;
  --radius:14px; --radius-sm:10px;
}

html{font-size:16px}
body{
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;padding:20px;
  -webkit-font-smoothing:antialiased
}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg .orb{
  position:absolute;border-radius:50%;
  filter:blur(100px);opacity:0.2;
  animation:orbFloat 25s ease-in-out infinite
}
.bg .orb:nth-child(1){width:550px;height:550px;background:#6c5ce7;top:-15%;left:-10%}
.bg .orb:nth-child(2){width:450px;height:450px;background:#00cec9;bottom:-10%;right:-8%;animation-delay:-8s}
.bg .orb:nth-child(3){width:300px;height:300px;background:#fd79a8;top:40%;left:55%;animation-delay:-16s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0)scale(1)}
  25%{transform:translate(50px,-30px)scale(1.05)}
  50%{transform:translate(-25px,40px)scale(0.95)}
  75%{transform:translate(35px,25px)scale(1.02)}
}

.container{position:relative;z-index:1;width:100%;max-width:500px}
header{
  text-align:center;margin-bottom:24px;
  animation:fadeDown .6s cubic-bezier(.16,1,.3,1) both
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
header h1{
  font-size:1.5rem;font-weight:600;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#6c5ce7,#00cec9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
header p{font-size:.82rem;color:var(--text-secondary);margin-top:4px}

.card{
  background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:0 25px 60px rgba(0,0,0,.4),0 0 40px rgba(108,92,231,.08);overflow:hidden;
  animation:scaleIn .5s cubic-bezier(.16,1,.3,1) .15s both
}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.add-form{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:8px
}
.add-form .row{display:flex;gap:8px}
.add-form .row input[type="text"]{
  flex:1;padding:12px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:rgba(255,255,255,.04);
  color:var(--text);font-size:.95rem;font-family:inherit;
  outline:none;transition:border-color .2s,box-shadow .2s
}
.add-form .row input[type="text"]::placeholder{color:var(--text-muted)}
.add-form .row input[type="text"]:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.add-form .row button{
  width:44px;height:44px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,#6c5ce7,#00cec9);
  color:#fff;font-size:1.4rem;cursor:pointer;display:grid;place-items:center;
  flex-shrink:0;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 15px rgba(108,92,231,.25)
}
.add-form .row button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,92,231,.35)}
.add-form .row button:active{transform:scale(.93)}
.add-form .row button:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.add-form .date-row{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text-secondary)}
.add-form .date-row label{display:flex;align-items:center;gap:6px;cursor:pointer}
.add-form .date-row input[type="date"]{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;color:var(--text);font-size:.8rem;font-family:inherit;
  outline:none;transition:border-color .2s;cursor:pointer
}
.add-form .date-row input[type="date"]:focus{border-color:var(--primary)}
.add-form .date-row .clear-date{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:.85rem;padding:2px 6px;border-radius:4px;display:none
}
.add-form .date-row .clear-date.show{display:inline}
.add-form .date-row .clear-date:hover{color:var(--delete);background:rgba(255,107,129,.1)}

.toolbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;border-bottom:1px solid var(--border);
  font-size:.8rem;color:var(--text-secondary)
}
.filters{display:flex;gap:4px}
.filters button,.clear-btn{
  background:none;border:none;cursor:pointer;font-family:inherit;font-size:.8rem;
  padding:4px 10px;border-radius:6px;transition:color .15s,background .15s
}
.filters button{color:var(--text-muted)}
.filters button:hover{color:var(--text-secondary);background:var(--surface-hover)}
.filters button.active{color:var(--primary);background:rgba(108,92,231,.12)}
.clear-btn{color:var(--delete);opacity:0;pointer-events:none;transition:opacity .2s}
.clear-btn.show{opacity:1;pointer-events:auto}
.clear-btn:hover{background:rgba(255,107,129,.1)}

.list{padding:4px 8px;min-height:80px}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);animation:fadeIn .3s ease}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}
.empty p{font-size:.9rem}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.offline-banner{
  background:rgba(255,107,129,.1);border-bottom:1px solid rgba(255,107,129,.2);
  padding:10px 20px;text-align:center;font-size:.8rem;color:var(--delete);display:none
}
.offline-banner.show{display:block}

.item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin:4px 0;border-radius:var(--radius-sm);
  transition:background .15s;cursor:default;
  animation:itemIn .35s cubic-bezier(.16,1,.3,1) both;position:relative
}
.item.dragging{opacity:.5;background:var(--surface-hover)}
.item.drag-over{border-top:2px solid var(--primary)}
@keyframes itemIn{from{opacity:0;transform:translateY(12px)scale(.97)}to{opacity:1;transform:translateY(0)scale(1)}}
.item.removing{animation:itemOut .25s ease both;pointer-events:none}
@keyframes itemOut{to{opacity:0;transform:translateX(30px)scale(.95)}}
.item:hover{background:var(--surface-hover)}
.item .drag-handle{
  width:16px;flex-shrink:0;cursor:grab;opacity:0;transition:opacity .15s;
  display:grid;place-items:center;color:var(--text-muted);font-size:.7rem
}
.item:hover .drag-handle{opacity:.4}
.drag-handle:active{cursor:grabbing}

.item .checkbox{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  cursor:pointer;flex-shrink:0;
  transition:border-color .2s,background .2s,transform .15s;
  display:grid;place-items:center;position:relative
}
.item .checkbox:hover{border-color:var(--primary);transform:scale(1.1)}
.item .checkbox.checked{
  background:linear-gradient(135deg,#00cec9,#6c5ce7);border-color:transparent
}
.item .checkbox.checked::after{
  content:'';width:7px;height:11px;border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg)translateY(-1px);
  animation:checkPop .2s cubic-bezier(.34,1.56,.64,1)
}
@keyframes checkPop{0%{transform:rotate(45deg)translateY(-1px)scale(0)}100%{transform:rotate(45deg)translateY(-1px)scale(1)}}

.item .text-wrap{flex:1;min-width:0}
.item .text{
  font-size:.92rem;line-height:1.4;word-break:break-word;display:block;
  transition:color .2s
}
.item .text.done{color:var(--text-muted);text-decoration:line-through}
.item .text-edit{
  width:100%;padding:4px 8px;border-radius:6px;
  border:1px solid var(--primary);background:rgba(108,92,231,.08);
  color:var(--text);font-size:.92rem;font-family:inherit;outline:none
}
.item .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px}
.item .date{
  font-size:.7rem;padding:1px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:3px
}
.item .date.created{color:var(--text-muted)}
.item .date.due{color:var(--text-secondary);background:rgba(255,255,255,.03)}
.item .date.overdue{color:var(--overdue);background:rgba(255,107,129,.1)}
.item .date.due-soon{color:var(--due-soon);background:rgba(249,202,36,.08)}
.item .date.done-date{color:var(--complete);text-decoration:line-through}

.item .actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.item:hover .actions{opacity:1}
.item .actions button{
  width:28px;height:28px;border:none;border-radius:6px;
  cursor:pointer;display:grid;place-items:center;font-size:.85rem;
  transition:background .15s,color .15s;font-family:inherit
}
.item .actions .edit-btn{background:none;color:var(--text-muted)}
.item .actions .edit-btn:hover{background:rgba(108,92,231,.12);color:var(--primary)}
.item .actions .del-btn{background:none;color:var(--text-muted)}
.item .actions .del-btn:hover{background:rgba(255,107,129,.12);color:var(--delete)}
.item .actions button:active{transform:scale(.9)}

.toast-container{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;align-items:center
}
.toast{
  background:rgba(255,255,255,.08);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 16px;font-size:.85rem;color:var(--text);
  box-shadow:0 8px 30px rgba(0,0,0,.3);
  animation:toastIn .3s cubic-bezier(.16,1,.3,1) both;
  display:flex;align-items:center;gap:12px;pointer-events:auto
}
.toast.removing{animation:toastOut .2s ease both}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)scale(.95)}to{opacity:1;transform:translateY(0)scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(10px)}}
.toast .toast-undo{
  background:linear-gradient(135deg,#6c5ce7,#00cec9);
  border:none;color:#fff;padding:4px 12px;border-radius:6px;
  cursor:pointer;font-size:.8rem;font-family:inherit;font-weight:500;transition:transform .1s
}
.toast .toast-undo:active{transform:scale(.95)}
.toast .toast-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:2px;display:grid;place-items:center}

.pulse{animation:pulse .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

@media(max-width:500px){
  body{padding:12px}
  .add-form{padding:12px 14px}
  .add-form .row input[type="text"]{padding:10px 12px;font-size:.9rem}
  .item{padding:8px 10px}
  .item .drag-handle{opacity:.4}
  .item .actions{opacity:1}
  .toolbar{flex-wrap:wrap;gap:6px}
  .filters button,.clear-btn{padding:3px 8px}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<div class="bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="container">
  <header>
    <h1>todo</h1>
    <p id="count">0 items</p>
  </header>

  <div class="card">
    <div class="add-form">
      <div class="row">
        <input id="input" type="text" placeholder="Add a task..." autofocus />
        <button id="addBtn">+</button>
      </div>
      <div class="date-row">
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Due
        </label>
        <input id="dueDateInput" type="date" />
        <button id="clearDateBtn" class="clear-date">✕</button>
      </div>
    </div>

    <div class="offline-banner" id="offlineBanner">Server unreachable — changes won't be saved</div>

    <div class="toolbar">
      <span id="remaining">0 left</span>
      <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="completed">Done</button>
      </div>
      <button class="clear-btn" id="clearBtn">Clear done</button>
    </div>

    <div class="list" id="list">
      <div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nothing here yet</p></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '/api/todos'
let todos = []
let filter = localStorage.getItem('todoFilter') || 'all'
let editingId = null
let online = true

const $ = s => document.querySelector(s)
const input = $('#input'), addBtn = $('#addBtn'), list = $('#list')
const count = $('#count'), remaining = $('#remaining'), clearBtn = $('#clearBtn')
const dueDateInput = $('#dueDateInput'), clearDateBtn = $('#clearDateBtn')
const toasts = $('#toasts'), offlineBanner = $('#offlineBanner')

function todayISO() { return new Date().toISOString().slice(0,10) }

function daysUntil(iso) {
  if (!iso) return null
  const now = new Date(); now.setHours(0,0,0,0)
  const then = new Date(iso + 'T00:00:00')
  return Math.round((then - now) / 86400000)
}

function dueStatus(iso, completed) {
  if (!iso || completed) return ''
  const d = daysUntil(iso)
  if (d < 0) return 'overdue'
  if (d === 0) return 'overdue'
  if (d <= 2) return 'due-soon'
  return ''
}

function formatDate(iso) {
  if (!iso) return ''
  const d = new Date(iso)
  const now = new Date()
  const diff = (now - d) / 1000
  if (diff < 60) return 'just now'
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago'
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago'
  if (diff < 172800) return 'yesterday'
  return d.toLocaleDateString()
}

function formatDue(iso) { if (!iso) return ''; const d = new Date(iso + 'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) }

async function checkServer() {
  try {
    const res = await fetch(API, { method:'HEAD' })
    online = res.ok || res.status >= 200
  } catch { online = false }
  offlineBanner.classList.toggle('show', !online)
  return online
}

async function api(method, path, body) {
  const opts = { method, headers:{'Content-Type':'application/json'} }
  if (body) opts.body = JSON.stringify(body)
  const res = await fetch(API + path, opts)
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || 'Request failed') }
  if (res.status === 204) return null
  return res.json()
}

async function loadTodos() {
  await checkServer()
  if (!online) return
  try { todos = await api('GET', '') } catch { online = false; offlineBanner.classList.toggle('show', !online); toast('Failed to load todos', 3000) }
  render()
}

function getDueDate() {
  const val = dueDateInput.value
  return val || ''
}

async function addTodo() {
  const text = input.value.trim()
  if (!text) return
  await checkServer()
  if (!online) { toast('Cannot add — server is offline', 3000); return }
  addBtn.disabled = true
  try {
    const dueDate = getDueDate()
    const todo = await api('POST', '', { text, dueDate })
    todos.unshift(todo)
    input.value = ''; dueDateInput.value = ''; clearDateBtn.classList.remove('show')
    input.focus()
    render()
  } catch (e) { toast(e.message, 3000) }
  finally { addBtn.disabled = false }
}

async function toggleTodo(id) {
  if (!online) return
  const t = todos.find(t => t.id === id)
  if (!t) return
  try {
    t.completed = !t.completed
    await api('PUT', '/' + id, { completed: t.completed })
    render()
  } catch (e) { t.completed = !t.completed; toast(e.message, 3000) }
}

function startEdit(id) {
  editingId = id; render()
  const edit = list.querySelector('.text-edit')
  if (edit) { edit.focus(); edit.select() }
}

async function saveEdit(id) {
  const edit = list.querySelector('.text-edit')
  if (!edit) return
  const text = edit.value.trim()
  if (!text) { editingId = null; render(); return }
  try {
    await api('PUT', '/' + id, { text })
    const t = todos.find(t => t.id === id)
    if (t) t.text = text
    editingId = null; render()
  } catch (e) { toast(e.message, 3000); editingId = null; render() }
}

function cancelEdit() { editingId = null; render() }

async function deleteTodo(id, el) {
  el.classList.add('removing')
  await new Promise(r => setTimeout(r, 250))
  const deleted = todos.find(t => t.id === id)
  todos = todos.filter(t => t.id !== id)
  render()
  showUndo(deleted)
  try { await api('DELETE', '/' + id) }
  catch (e) { todos.unshift(deleted); render(); toast(e.message, 3000) }
}

function showUndo(todo) {
  const el = document.createElement('div')
  el.className = 'toast'
  el.innerHTML = `Deleted "${esc(todo.text)}" <button class="toast-undo">Undo</button> <button class="toast-close">✕</button>`
  toasts.prepend(el)
  const timer = setTimeout(() => { if (el.parentNode) { el.classList.add('removing'); setTimeout(() => el.remove(), 200) } }, 5000)
  el.querySelector('.toast-undo').onclick = () => { clearTimeout(timer); el.classList.add('removing'); setTimeout(() => el.remove(), 200); undoDelete(todo) }
  el.querySelector('.toast-close').onclick = () => { clearTimeout(timer); el.classList.add('removing'); setTimeout(() => el.remove(), 200) }
}

function undoDelete(todo) {
  todos.unshift(todo); render()
  api('POST', '', { text: todo.text, dueDate: todo.dueDate || '' }).catch(() => {})
}

async function clearCompleted() {
  const completed = todos.filter(t => t.completed)
  todos = todos.filter(t => !t.completed); render()
  try {
    await Promise.all(completed.map(t => api('DELETE', '/' + t.id)))
    toast('Cleared ' + completed.length + ' completed', 2000)
  } catch (e) { completed.forEach(t => todos.push(t)); render(); toast(e.message, 3000) }
}

let dragId = null
list.addEventListener('dragstart', e => {
  const item = e.target.closest('.item'); if (!item) return
  dragId = item.dataset.id; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'
})
list.addEventListener('dragend', () => { document.querySelectorAll('.item').forEach(i => i.classList.remove('dragging','drag-over')) })
list.addEventListener('dragover', e => {
  e.preventDefault(); const item = e.target.closest('.item'); if (!item||item.dataset.id===dragId) return
  document.querySelectorAll('.item').forEach(i => i.classList.remove('drag-over'))
  const rect = item.getBoundingClientRect()
  if (e.clientY < rect.top + rect.height/2) item.classList.add('drag-over')
})
list.addEventListener('dragleave', e => { const item = e.target.closest('.item'); if (item&&item.dataset.id!==dragId) item.classList.remove('drag-over') })
list.addEventListener('drop', e => {
  e.preventDefault(); document.querySelectorAll('.item').forEach(i => i.classList.remove('dragging','drag-over'))
  const target = e.target.closest('.item'); if (!target||!dragId||target.dataset.id===dragId) return
  const from = todos.findIndex(t => t.id === dragId), to = todos.findIndex(t => t.id === target.dataset.id)
  if (from<0||to<0) return
  const [moved] = todos.splice(from,1); const rect = target.getBoundingClientRect()
  todos.splice(to + (e.clientY > rect.top + rect.height/2 ? 1 : 0), 0, moved)
  todos.forEach((t,i) => t.order = i); render()
  api('PUT', '/reorder', { order: todos.map((t,i) => ({id:t.id,order:i})) }).catch(() => {})
})

function toast(msg, duration = 2000) {
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg
  toasts.prepend(el)
  setTimeout(() => { if (el.parentNode) { el.classList.add('removing'); setTimeout(() => el.remove(), 200) } }, duration)
}

function render() {
  document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b.dataset.filter === filter))
  const filtered = filter === 'all' ? todos : filter === 'active' ? todos.filter(t=>!t.completed) : todos.filter(t=>t.completed)
  const activeCount = todos.filter(t=>!t.completed).length
  remaining.textContent = activeCount + ' left'
  count.textContent = todos.length + ' item' + (todos.length!==1?'s':'')
  clearBtn.classList.toggle('show', todos.some(t=>t.completed))

  if (todos.length === 0) {
    list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nothing here yet</p></div>'
    return
  }

  let html = ''
  for (const t of filtered) {
    const done = t.completed ? 'done' : ''
    const checked = t.completed ? 'checked' : ''
    const isEditing = editingId === t.id
    const textHtml = isEditing ? `<input class="text-edit" type="text" value="${esc(t.text)}">` : `<span class="text ${done}">${esc(t.text)}</span>`
    const createdDate = t.createdAt ? `<span class="date created">${formatDate(t.createdAt)}</span>` : ''
    const status = dueStatus(t.dueDate, t.completed)
    const dueHtml = t.dueDate ? `<span class="date due ${status} ${done}">${status === 'overdue' ? '⚠ ' : ''}${formatDue(t.dueDate)}</span>` : ''
    html += `<div class="item" data-id="${t.id}" draggable="true">
      <div class="drag-handle">⠿</div>
      <div class="checkbox ${checked}"></div>
      <div class="text-wrap">${textHtml}<div class="meta">${createdDate}${dueHtml}</div></div>
      <div class="actions">${isEditing ? '<button class="edit-btn" data-save>✓</button>' : '<button class="edit-btn">✎</button>'}<button class="del-btn">✕</button></div>
    </div>`
  }
  list.innerHTML = html || '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nothing here yet</p></div>'
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

dueDateInput.addEventListener('input', () => clearDateBtn.classList.toggle('show', !!dueDateInput.value))
clearDateBtn.addEventListener('click', () => { dueDateInput.value = ''; clearDateBtn.classList.remove('show') })

list.addEventListener('click', e => {
  const item = e.target.closest('.item'); if (!item) return
  const id = item.dataset.id
  if (e.target.closest('[data-save]')) { saveEdit(id); return }
  if (e.target.closest('.del-btn')) { deleteTodo(id, item); return }
  if (e.target.closest('.edit-btn')) { startEdit(id); return }
  if (e.target.closest('.checkbox')) { toggleTodo(id); return }
})

list.addEventListener('dblclick', e => { const t = e.target.closest('.text'); if (t&&editingId===null) { const i = t.closest('.item'); if (i) startEdit(i.dataset.id) } })
list.addEventListener('keydown', e => {
  if (e.key==='Enter' && e.target.classList.contains('text-edit')) { saveEdit(e.target.closest('.item').dataset.id); e.preventDefault() }
  if (e.key==='Escape' && editingId) { cancelEdit(); e.preventDefault() }
})

input.addEventListener('keydown', e => { if (e.key==='Enter') addTodo() })
addBtn.addEventListener('click', addTodo)
clearBtn.addEventListener('click', clearCompleted)

document.querySelectorAll('.filters button').forEach(b => {
  b.addEventListener('click', () => { filter = b.dataset.filter; localStorage.setItem('todoFilter', filter); render() })
})

loadTodos()
</script>
</body>
</html>
