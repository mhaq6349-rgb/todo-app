<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Todo</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --paper:#f5f0eb; --card:#fff; --card-border:#e8e0d8;
  --text:#2d2a24; --text-secondary:#8a8379; --text-muted:#b8b0a6;
  --accent:#e07a5f; --accent-hover:#d46a4e; --accent-light:rgba(224,122,95,.08);
  --ink:#3d405b; --complete:#81b29a; --delete:#c65d4a;
  --overdue:#c65d4a; --due-soon:#d4a017;
  --shadow:0 2px 8px rgba(45,42,36,.06),0 8px 32px rgba(45,42,36,.04);
  --shadow-lg:0 4px 16px rgba(45,42,36,.08),0 16px 48px rgba(45,42,36,.06);
  --radius:16px; --radius-sm:10px;
}

html{font-size:16px}
body{
  font-family:Georgia,serif;
  background:var(--paper);color:var(--text);
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;padding:20px;
  -webkit-font-smoothing:antialiased
}

.container{width:100%;max-width:500px}
header{
  text-align:center;margin-bottom:20px;padding:12px 0
}
header h1{
  font-size:1.8rem;font-weight:700;letter-spacing:-0.5px;
  color:var(--ink);position:relative;display:inline-block
}
header h1::after{
  content:'';position:absolute;bottom:-4px;left:10%;width:80%;height:2px;
  background:var(--accent);border-radius:2px
}
header p{font-size:.85rem;color:var(--text-secondary);margin-top:8px;font-family:system-ui,sans-serif}

.card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden
}

.add-form{
  padding:16px 20px;border-bottom:1px solid var(--card-border);
  display:flex;flex-direction:column;gap:8px
}
.add-form .row{display:flex;gap:8px}
.add-form .row input[type="text"]{
  flex:1;padding:12px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--card-border);background:var(--paper);
  color:var(--text);font-size:.95rem;font-family:Georgia,serif;
  outline:none;transition:border-color .2s,box-shadow .2s
}
.add-form .row input[type="text"]::placeholder{color:var(--text-muted);font-style:italic}
.add-form .row input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.add-form .row button{
  width:44px;height:44px;border-radius:var(--radius-sm);border:1px solid var(--accent);
  background:var(--accent);color:#fff;font-size:1.3rem;cursor:pointer;
  display:grid;place-items:center;flex-shrink:0;
  transition:background .15s,transform .15s,box-shadow .15s
}
.add-form .row button:hover{background:var(--accent-hover);box-shadow:0 2px 8px rgba(224,122,95,.25)}
.add-form .row button:active{transform:scale(.95)}
.add-form .row button:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.add-form .date-row{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text-secondary);font-family:system-ui,sans-serif}
.add-form .date-row label{display:flex;align-items:center;gap:6px;cursor:pointer}
.add-form .date-row input[type="date"]{
  background:var(--paper);border:1px solid var(--card-border);
  border-radius:6px;padding:5px 10px;color:var(--text);font-size:.8rem;font-family:system-ui,sans-serif;
  outline:none;transition:border-color .2s;cursor:pointer
}
.add-form .date-row input[type="date"]:focus{border-color:var(--accent)}
.add-form .date-row .clear-date{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:.85rem;padding:2px 6px;border-radius:4px;display:none
}
.add-form .date-row .clear-date.show{display:inline}
.add-form .date-row .clear-date:hover{color:var(--delete);background:var(--accent-light)}

.toolbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;border-bottom:1px solid var(--card-border);
  font-size:.8rem;color:var(--text-secondary);font-family:system-ui,sans-serif
}
.filters{display:flex;gap:4px;background:var(--paper);padding:2px;border-radius:8px}
.filters button,.clear-btn{
  border:none;cursor:pointer;font-family:system-ui,sans-serif;font-size:.78rem;
  padding:5px 12px;border-radius:6px;transition:all .15s
}
.filters button{background:transparent;color:var(--text-secondary)}
.filters button:hover{color:var(--text)}
.filters button.active{background:var(--card);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.clear-btn{background:transparent;color:var(--text-muted);opacity:0;pointer-events:none}
.clear-btn.show{opacity:1;pointer-events:auto}
.clear-btn:hover{color:var(--delete);background:var(--accent-light)}

.list{padding:4px 8px;min-height:80px;background:var(--card)}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}
.empty p{font-size:.9rem;font-family:system-ui,sans-serif;font-style:italic}

.offline-banner{
  background:var(--accent-light);border-bottom:1px solid rgba(224,122,95,.2);
  padding:10px 20px;text-align:center;font-size:.8rem;color:var(--accent);display:none;
  font-family:system-ui,sans-serif
}
.offline-banner.show{display:block}

.item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin:4px 0;border-radius:var(--radius-sm);
  transition:background .15s;cursor:default;
  position:relative;background:var(--card);
  border:1px solid transparent
}
.item.dragging{opacity:.5;border-color:var(--card-border);background:var(--paper)}
.item.drag-over{border-top:2px solid var(--accent)}
.item:hover{background:var(--paper)}
.item .drag-handle{
  width:16px;flex-shrink:0;cursor:grab;opacity:0;transition:opacity .15s;
  display:grid;place-items:center;color:var(--text-muted);font-size:.7rem
}
.item:hover .drag-handle{opacity:.4}
.drag-handle:active{cursor:grabbing}

.item .checkbox{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--card-border);
  cursor:pointer;flex-shrink:0;
  transition:border-color .2s,background .2s,transform .15s;
  display:grid;place-items:center;position:relative
}
.item .checkbox:hover{border-color:var(--accent);transform:scale(1.1)}
.item .checkbox.checked{
  background:var(--complete);border-color:var(--complete)
}
.item .checkbox.checked::after{
  content:'';width:7px;height:11px;border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg)translateY(-1px)
}

.item .text-wrap{flex:1;min-width:0}
.item .text{
  font-size:.95rem;line-height:1.5;word-break:break-word;display:block;
  transition:color .2s
}
.item .text.done{color:var(--text-muted);text-decoration:line-through}
.item .text-edit{
  width:100%;padding:4px 8px;border-radius:6px;
  border:1px solid var(--accent);background:var(--paper);
  color:var(--text);font-size:.95rem;font-family:Georgia,serif;outline:none
}
.item .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px}
.item .date{
  font-size:.68rem;padding:2px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;
  font-family:system-ui,sans-serif
}
.item .date.created{color:var(--text-muted);background:var(--paper)}
.item .date.due{color:var(--text-secondary);background:var(--paper)}
.item .date.overdue{color:var(--overdue);background:rgba(198,93,74,.08);font-weight:500}
.item .date.due-soon{color:var(--due-soon);background:rgba(212,160,23,.08);font-weight:500}
.item .date.done-date{color:var(--complete);text-decoration:line-through}

.item .actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.item:hover .actions{opacity:1}
.item .actions button{
  width:28px;height:28px;border:none;border-radius:6px;
  cursor:pointer;display:grid;place-items:center;font-size:.85rem;
  transition:background .15s,color .15s;font-family:system-ui,sans-serif
}
.item .actions .edit-btn{background:transparent;color:var(--text-muted)}
.item .actions .edit-btn:hover{background:var(--accent-light);color:var(--accent)}
.item .actions .del-btn{background:transparent;color:var(--text-muted)}
.item .actions .del-btn:hover{background:rgba(198,93,74,.08);color:var(--delete)}
.item .actions button:active{transform:scale(.9)}

.toast-container{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;align-items:center
}
.toast{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);
  padding:10px 16px;font-size:.85rem;color:var(--text);
  display:flex;align-items:center;gap:12px;pointer-events:auto;
  font-family:system-ui,sans-serif
}
.toast .toast-undo{
  background:var(--accent);border:none;color:#fff;padding:4px 12px;border-radius:6px;
  cursor:pointer;font-size:.8rem;font-family:system-ui,sans-serif;font-weight:500;transition:transform .1s
}
.toast .toast-undo:active{transform:scale(.95)}
.toast .toast-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:2px;display:grid;place-items:center}

@media(max-width:500px){
  body{padding:12px}
  .add-form{padding:12px 14px}
  .add-form .row input[type="text"]{padding:10px 12px;font-size:.9rem}
  .item{padding:8px 10px}
  .item .drag-handle{opacity:.4}
  .item .actions{opacity:1}
  .toolbar{flex-wrap:wrap;gap:6px}
  .filters button,.clear-btn{padding:4px 10px}
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>todo</h1>
    <p id="count">0 items</p>
  </header>

  <div class="card">
    <div class="add-form">
      <div class="row">
        <input id="input" type="text" placeholder="What needs doing?" autofocus />
        <button id="addBtn">+</button>
      </div>
      <div class="date-row">
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Due
        </label>
        <input id="dueDateInput" type="date" />
        <button id="clearDateBtn" class="clear-date">✕</button>
      </div>
    </div>

    <div class="toolbar">
      <span id="remaining">0 left</span>
      <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="completed">Done</button>
      </div>
      <button class="clear-btn" id="clearBtn">Clear done</button>
    </div>

    <div class="list" id="list">
      <div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nothing here yet</p></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '/api/todos'
const STORAGE_KEY = 'todoApp'
let todos = []
let filter = localStorage.getItem('todoFilter') || 'all'
let editingId = null
let serverAvail = false

const $ = s => document.querySelector(s)
const input = $('#input'), addBtn = $('#addBtn'), list = $('#list')
const count = $('#count'), remaining = $('#remaining'), clearBtn = $('#clearBtn')
const dueDateInput = $('#dueDateInput'), clearDateBtn = $('#clearDateBtn')
const toasts = $('#toasts')

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36) }

function todayISO() { return new Date().toISOString().slice(0,10) }

function daysUntil(iso) {
  if (!iso) return null
  const now = new Date(); now.setHours(0,0,0,0)
  const then = new Date(iso + 'T00:00:00')
  return Math.round((then - now) / 86400000)
}

function dueStatus(iso, completed) {
  if (!iso || completed) return ''
  const d = daysUntil(iso)
  if (d < 0) return 'overdue'
  if (d === 0) return 'overdue'
  if (d <= 2) return 'due-soon'
  return ''
}

function formatDate(iso) {
  if (!iso) return ''
  const d = new Date(iso)
  const now = new Date()
  const diff = (now - d) / 1000
  if (diff < 60) return 'just now'
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago'
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago'
  if (diff < 172800) return 'yesterday'
  return d.toLocaleDateString()
}

function formatDue(iso) { if (!iso) return ''; const d = new Date(iso + 'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) }

function lsSave() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)) }
function lsLoad() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch { return [] }
}

async function serverSync() {
  try {
    const res = await fetch(API + '?_=' + Date.now())
    serverAvail = res.ok
  } catch { serverAvail = false }
}

async function api(method, path, body) {
  if (!serverAvail) return null
  const opts = { method, headers:{'Content-Type':'application/json'} }
  if (body) opts.body = JSON.stringify(body)
  try {
    const res = await fetch(API + path, opts)
    if (!res.ok) return null
    if (res.status === 204) return null
    return res.json()
  } catch { return null }
}

async function loadTodos() {
  await serverSync()
  if (serverAvail) {
    try {
      const data = await api('GET', '')
      if (data && data.length) {
        todos = data.map(t => ({ ...t, id: uid(), serverId: t.id }))
        lsSave(); render(); return
      }
    } catch {}
  }
  todos = lsLoad()
  render()
}

function getDueDate() { return dueDateInput.value || '' }

async function addTodo() {
  const text = input.value.trim()
  if (!text) return
  const todo = { id: uid(), text, completed: false, createdAt: new Date().toISOString(), order: todos.length, dueDate: getDueDate() }
  todos.unshift(todo)
  lsSave()
  input.value = ''; dueDateInput.value = ''; clearDateBtn.classList.remove('show')
  input.focus()
  render()
  api('POST', '', { text, dueDate: todo.dueDate }).then(d => { if (d) { todo.serverId = d.id; todo.completed = d.completed; todo.createdAt = d.createdAt; lsSave() } })
}

async function toggleTodo(id) {
  const t = todos.find(t => t.id === id)
  if (!t) return
  t.completed = !t.completed
  lsSave(); render()
  api('PUT', '/' + (t.serverId || t.id), { completed: t.completed })
}

function startEdit(id) {
  editingId = id; render()
  const edit = list.querySelector('.text-edit')
  if (edit) { edit.focus(); edit.select() }
}

function saveEdit(id) {
  const edit = list.querySelector('.text-edit')
  if (!edit) return
  const text = edit.value.trim()
  if (!text) { editingId = null; render(); return }
  const t = todos.find(t => t.id === id)
  if (t) t.text = text
  editingId = null; lsSave(); render()
  api('PUT', '/' + (t.serverId || t.id), { text })
}

function cancelEdit() { editingId = null; render() }

async function deleteTodo(id, el) {
  el.classList.add('removing')
  await new Promise(r => setTimeout(r, 250))
  const deleted = todos.find(t => t.id === id)
  todos = todos.filter(t => t.id !== id)
  lsSave(); render()
  showUndo(deleted)
  api('DELETE', '/' + (deleted.serverId || deleted.id))
}

function showUndo(todo) {
  const el = document.createElement('div')
  el.className = 'toast'
  el.innerHTML = `Deleted "${esc(todo.text)}" <button class="toast-undo">Undo</button> <button class="toast-close">✕</button>`
  toasts.prepend(el)
  const timer = setTimeout(() => { if (el.parentNode) { el.classList.add('removing'); setTimeout(() => el.remove(), 200) } }, 5000)
  el.querySelector('.toast-undo').onclick = () => { clearTimeout(timer); el.classList.add('removing'); setTimeout(() => el.remove(), 200); undoDelete(todo) }
  el.querySelector('.toast-close').onclick = () => { clearTimeout(timer); el.classList.add('removing'); setTimeout(() => el.remove(), 200) }
}

function undoDelete(todo) {
  todos.unshift(todo); lsSave(); render()
  api('POST', '', { text: todo.text, dueDate: todo.dueDate || '' }).then(d => { if (d) todo.serverId = d.id })
}

function clearCompleted() {
  const completed = todos.filter(t => t.completed)
  todos = todos.filter(t => !t.completed)
  lsSave(); render()
  toast('Cleared ' + completed.length + ' completed', 2000)
  Promise.all(completed.map(t => api('DELETE', '/' + (t.serverId || t.id))))
}

let dragId = null
list.addEventListener('dragstart', e => {
  const item = e.target.closest('.item'); if (!item) return
  dragId = item.dataset.id; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'
})
list.addEventListener('dragend', () => { document.querySelectorAll('.item').forEach(i => i.classList.remove('dragging','drag-over')) })
list.addEventListener('dragover', e => {
  e.preventDefault(); const item = e.target.closest('.item'); if (!item||item.dataset.id===dragId) return
  document.querySelectorAll('.item').forEach(i => i.classList.remove('drag-over'))
  const rect = item.getBoundingClientRect()
  if (e.clientY < rect.top + rect.height/2) item.classList.add('drag-over')
})
list.addEventListener('dragleave', e => { const item = e.target.closest('.item'); if (item&&item.dataset.id!==dragId) item.classList.remove('drag-over') })
list.addEventListener('drop', e => {
  e.preventDefault(); document.querySelectorAll('.item').forEach(i => i.classList.remove('dragging','drag-over'))
  const target = e.target.closest('.item'); if (!target||!dragId||target.dataset.id===dragId) return
  const from = todos.findIndex(t => t.id === dragId), to = todos.findIndex(t => t.id === target.dataset.id)
  if (from<0||to<0) return
  const [moved] = todos.splice(from,1); const rect = target.getBoundingClientRect()
  todos.splice(to + (e.clientY > rect.top + rect.height/2 ? 1 : 0), 0, moved)
  todos.forEach((t,i) => t.order = i)
  lsSave(); render()
  api('PUT', '/reorder', { order: todos.map((t,i) => ({id:t.serverId || t.id,order:i})) })
})

function toast(msg, duration = 2000) {
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg
  toasts.prepend(el)
  setTimeout(() => { if (el.parentNode) { el.classList.add('removing'); setTimeout(() => el.remove(), 200) } }, duration)
}

function render() {
  document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b.dataset.filter === filter))
  const filtered = filter === 'all' ? todos : filter === 'active' ? todos.filter(t=>!t.completed) : todos.filter(t=>t.completed)
  const activeCount = todos.filter(t=>!t.completed).length
  remaining.textContent = activeCount + ' left'
  count.textContent = todos.length + ' item' + (todos.length!==1?'s':'')
  clearBtn.classList.toggle('show', todos.some(t=>t.completed))

  if (todos.length === 0) {
    list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nothing here yet</p></div>'
    return
  }

  let html = ''
  for (const t of filtered) {
    const done = t.completed ? 'done' : ''
    const checked = t.completed ? 'checked' : ''
    const isEditing = editingId === t.id
    const textHtml = isEditing ? `<input class="text-edit" type="text" value="${esc(t.text)}">` : `<span class="text ${done}">${esc(t.text)}</span>`
    const createdDate = t.createdAt ? `<span class="date created">${formatDate(t.createdAt)}</span>` : ''
    const status = dueStatus(t.dueDate, t.completed)
    const dueHtml = t.dueDate ? `<span class="date due ${status} ${done}">${status === 'overdue' ? '⚠ ' : ''}${formatDue(t.dueDate)}</span>` : ''
    html += `<div class="item" data-id="${t.id}" draggable="true">
      <div class="drag-handle">⠿</div>
      <div class="checkbox ${checked}"></div>
      <div class="text-wrap">${textHtml}<div class="meta">${createdDate}${dueHtml}</div></div>
      <div class="actions">${isEditing ? '<button class="edit-btn" data-save>✓</button>' : '<button class="edit-btn">✎</button>'}<button class="del-btn">✕</button></div>
    </div>`
  }
  list.innerHTML = html || '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nothing here yet</p></div>'
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

dueDateInput.addEventListener('input', () => clearDateBtn.classList.toggle('show', !!dueDateInput.value))
clearDateBtn.addEventListener('click', () => { dueDateInput.value = ''; clearDateBtn.classList.remove('show') })

list.addEventListener('click', e => {
  const item = e.target.closest('.item'); if (!item) return
  const id = item.dataset.id
  if (e.target.closest('[data-save]')) { saveEdit(id); return }
  if (e.target.closest('.del-btn')) { deleteTodo(id, item); return }
  if (e.target.closest('.edit-btn')) { startEdit(id); return }
  if (e.target.closest('.checkbox')) { toggleTodo(id); return }
})

list.addEventListener('dblclick', e => { const t = e.target.closest('.text'); if (t&&editingId===null) { const i = t.closest('.item'); if (i) startEdit(i.dataset.id) } })
list.addEventListener('keydown', e => {
  if (e.key==='Enter' && e.target.classList.contains('text-edit')) { saveEdit(e.target.closest('.item').dataset.id); e.preventDefault() }
  if (e.key==='Escape' && editingId) { cancelEdit(); e.preventDefault() }
})

input.addEventListener('keydown', e => { if (e.key==='Enter') addTodo() })
addBtn.addEventListener('click', addTodo)
clearBtn.addEventListener('click', clearCompleted)

document.querySelectorAll('.filters button').forEach(b => {
  b.addEventListener('click', () => { filter = b.dataset.filter; localStorage.setItem('todoFilter', filter); render() })
})

loadTodos()
</script>
</body>
</html>
